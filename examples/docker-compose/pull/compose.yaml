services:
  producer:
    build:
      context: ../../..
      dockerfile: Dockerfile
    entrypoint: ["python", "/examples/producer.py"]
    environment:
      QUEUE_NAME: emails
      QUEUE_STORE_PATH: /data/queue.sqlite3
    volumes:
      - queue-data:/data
      - .:/examples:ro

  worker:
    build:
      context: ../../..
      dockerfile: Dockerfile
    command:
      - queue
      - exec
      - emails
      - --store-path
      - /data/queue.sqlite3
      - --retry-store-path
      - /data/retries.sqlite3
      - --forever
      - --block
      - --idle-sleep
      - "1"
      - --
      - python
      - /examples/worker.py
    volumes:
      - queue-data:/data
      - .:/examples:ro

volumes:
  queue-data:
