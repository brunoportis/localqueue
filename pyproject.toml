[project]
name = "localqueue"
version = "0.3.1"
description = "Durable local queues for Python, with persistent retry state powered by Tenacity."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "Bruno Portis" },
]
dependencies = [
    "tenacity>=9.1.4",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.optional-dependencies]
cli = [
    "pyyaml>=6.0.3",
    "rich>=15.0.0",
    "typer>=0.16.0",
]
lmdb = [
    "lmdb>=2.2.0",
]
sqlite = []
all = [
    "lmdb>=2.2.0",
    "pyyaml>=6.0.3",
    "rich>=15.0.0",
    "typer>=0.16.0",
]

[project.scripts]
localqueue = "localqueue.cli:main"

[project.urls]
Homepage = "https://brunoportis.github.io/localqueue/"
Documentation = "https://brunoportis.github.io/localqueue/"
Repository = "https://github.com/brunoportis/localqueue"
Issues = "https://github.com/brunoportis/localqueue/issues"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["localqueue"]

[tool.hatch.build.targets.sdist]
include = [
    "/CHANGELOG.md",
    "/LICENSE",
    "/README.md",
    "/docs",
    "/examples",
    "/localqueue",
    "/pyproject.toml",
    "/tests",
    "/uv.lock",
]

[dependency-groups]
dev = [
    "basedpyright>=1.39.2",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "zensical>=0.0.33",
]

[tool.basedpyright]
pythonVersion = "3.11"
pythonPlatform = "All"
venvPath = "."
venv = ".venv"
typeCheckingMode = "standard"

[tool.ruff.lint]
extend-select = ["TC", "C901"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["TC", "C901"]
"examples/**" = ["TC", "C901"]
