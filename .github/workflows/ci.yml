name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      candidate_ref:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      expected_version:
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_CANDIDATE_REF: ${{ inputs.candidate_ref }}
  RELEASE_CANDIDATE_SHA: ${{ inputs.expected_sha }}
  RELEASE_CANDIDATE_VERSION: ${{ inputs.expected_version }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python lint and types
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install Python quality tools
        run: |
          python -m pip install --upgrade \
            "pydantic>=2,<3" \
            "ruff>=0.15,<1" \
            "pyrefly>=1.1,<2"

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run Pyrefly
        env:
          PYTHONPATH: python
        run: pyrefly check --progress-bar no

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The CLI result is the quality gate. Keep SARIF uploads opt-in so
          # a transient Actions artifact quota cannot hide scan results.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "false"

  rust-quality:
    name: Rust format and Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  rust-dependencies:
    name: Rust dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check

  msrv:
    name: Rust MSRV 1.83
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Install Rust 1.83
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # master
        with:
          toolchain: '1.83'

      - name: Check with MSRV
        run: cargo check --locked

  python-tests:
    name: Python tests (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.10'
          - os: ubuntu-latest
            python: '3.14'
          - os: macos-15
            python: '3.14'
          - os: windows-latest
            python: '3.14'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Cache Cargo dependencies and build outputs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py${{ matrix.python }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py${{ matrix.python }}-
            ${{ runner.os }}-cargo-

      - name: Build extension in a virtual environment
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          python -m pip install --upgrade \
            "maturin>=1.14,<2" \
            "hypothesis>=6,<7" \
            "pytest>=8,<10" \
            "pytest-cov>=7,<8" \
            "pydantic>=2,<3"
          maturin develop --locked

      - name: Run tests
        if: matrix.os != 'ubuntu-latest' || matrix.python != '3.14'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pytest -ra

      - name: Run tests with branch coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.14'
        shell: bash
        run: |
          source .venv/bin/activate
          pytest -ra \
            --cov=localqueue \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Validate canonical benchmark smoke profile
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.14'
        shell: bash
        run: |
          source .venv/bin/activate
          python -m localqueue.benchmark --profile smoke --output "$RUNNER_TEMP/benchmark-smoke.json"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.14'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  crash-harness:
    name: Deterministic crash harness (Linux)
    needs: [rust-quality, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Install test build tooling
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade \
            "maturin>=1.14,<2" \
            "pytest>=8,<10" \
            "pydantic>=2,<3"

      - name: Build extension with explicit test-only feature
        run: |
          source .venv/bin/activate
          maturin develop --locked --features __crash_test

      - name: Run deterministic crash and control scenarios
        run: |
          source .venv/bin/activate
          if [[ -n "$RELEASE_CANDIDATE_REF" ]]; then
            python scripts/run_crash_campaign.py \
              --candidate-sha "$RELEASE_CANDIDATE_SHA" \
              --candidate-ref "$RELEASE_CANDIDATE_REF" \
              --candidate-version "$RELEASE_CANDIDATE_VERSION" \
              --output "$RUNNER_TEMP/deterministic-crash.json" \
              --markdown-output "$RUNNER_TEMP/deterministic-crash.md" \
              --scenario-dir "$RUNNER_TEMP/crash-scenarios"
          else
            pytest -ra tests/test_crash_recovery.py tests/test_backup.py
          fi

      - name: Upload deterministic crash evidence
        if: always() && inputs.candidate_ref != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deterministic-crash
          path: |
            ${{ runner.temp }}/deterministic-crash.json
            ${{ runner.temp }}/deterministic-crash.md
            ${{ runner.temp }}/crash-scenarios/
          if-no-files-found: error
          retention-days: 30

  wheel-smoke:
    name: Build and smoke-test wheel
    needs: [python-quality, secrets, rust-quality, rust-dependencies, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install wheel and release artifact tooling
        run: python -m pip install --upgrade "maturin>=1.14,<2" "packaging>=24,<26"

      - name: Build wheel
        run: maturin build --release --locked -i python

      - name: Install wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall target/wheels/*.whl
          python -m pip install --upgrade "pydantic>=2,<3"

      - name: Verify normal wheel has no crash hooks
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/tests/test_wheel_isolation.py"

      - name: Validate inventory from the wheel Maturin produced
        shell: bash
        run: |
          inventory_sha="${RELEASE_CANDIDATE_SHA:-$(git rev-parse HEAD)}"
          inventory_version="${RELEASE_CANDIDATE_VERSION:-$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')}"
          python -m release_gate.cli inventory \
            --directory target/wheels \
            --pattern '*.whl' \
            --candidate-sha "$inventory_sha" \
            --version "$inventory_version" \
            --build-job linux-x86_64 \
            --smoke-status built-not-smoke-tested \
            --smoke-passed-filename "$(basename target/wheels/*.whl)" \
            --output "$RUNNER_TEMP/ci-wheel-inventory.json"

      - name: Import package outside the checkout
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/scripts/smoke_installed_wheel.py"

      - name: Run canonical benchmark from installed wheel
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python -m localqueue.benchmark \
            --profile smoke \
            --durability normal \
            --output "$RUNNER_TEMP/benchmark-wheel-smoke.json"
          python - <<'PY'
          import importlib.metadata
          import json
          import os
          import localqueue
          from localqueue import localqueue as native

          report = json.load(open("benchmark-wheel-smoke.json", encoding="utf-8"))
          assert report["schema_version"] == 1
          assert report["profile"]["profile_schema_version"] == 1
          assert report["run"]["status"] == "passed"
          assert len(report["scenarios"]) == 7
          assert all(item["status"] == "passed" for item in report["scenarios"])
          assert all(item["correctness"]["integrity"] for item in report["scenarios"])
          assert report["subject"]["package_native_versions_consistent"] is True
          assert report["subject"]["rust_extension_version"] == importlib.metadata.version("localqueue")
          assert "site-packages" in localqueue.__file__
          assert "site-packages" in native.__file__
          assert os.environ["GITHUB_WORKSPACE"] not in localqueue.__file__
          assert os.environ["GITHUB_WORKSPACE"] not in native.__file__
          PY

      - name: Write release wheel smoke summary
        if: inputs.candidate_ref != ''
        shell: bash
        run: |
          module_path=$(cd "$RUNNER_TEMP" && python -c 'import localqueue; print(localqueue.__file__)')
          python -m release_gate.cli summary-report \
            --name wheel-smoke \
            --status passed \
            --candidate-sha "$RELEASE_CANDIDATE_SHA" \
            --candidate-ref "$RELEASE_CANDIDATE_REF" \
            --version "$RELEASE_CANDIDATE_VERSION" \
            --installed-module-path "$module_path" \
            --output "$RUNNER_TEMP/wheel-smoke-summary.json"

      - name: Upload release wheel smoke summary
        if: inputs.candidate_ref != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-wheel-smoke-summary
          path: ${{ runner.temp }}/wheel-smoke-summary.json
          if-no-files-found: error
          retention-days: 30

  multiprocess-benchmark:
    name: Multiprocess benchmark correctness (Linux)
    needs: [python-quality, rust-quality, python-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Build and install wheel
        shell: bash
        run: |
          python -m pip install --upgrade "maturin>=1.14,<2"
          maturin build --release --locked -i python
          python -m pip install --force-reinstall --no-index target/wheels/*.whl

      - name: Run benchmark and preserve its exit code
        id: benchmark
        shell: bash
        run: |
          set +e
          cd "$RUNNER_TEMP"
          LOCALQUEUE_COMMIT_SHA="$GITHUB_SHA" python -m localqueue.benchmark \
            --profile multiprocess-ci \
            --output multiprocess-ci.json
          benchmark_exit=$?
          if [[ -f multiprocess-ci.json ]]; then
            python -m localqueue.benchmark render \
              multiprocess-ci.json \
              --output multiprocess-ci.md
            render_exit=$?
          else
            render_exit=0
          fi
          echo "benchmark_exit=$benchmark_exit" >> "$GITHUB_OUTPUT"
          echo "render_exit=$render_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload multiprocess reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: multiprocess-ci-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/multiprocess-ci.json
            ${{ runner.temp }}/multiprocess-ci.md
          if-no-files-found: warn

      - name: Enforce benchmark correctness result
        if: always()
        shell: bash
        env:
          BENCHMARK_EXIT: ${{ steps.benchmark.outputs.benchmark_exit }}
          RENDER_EXIT: ${{ steps.benchmark.outputs.render_exit }}
        run: |
          test "${BENCHMARK_EXIT:-1}" -eq 0
          test "${RENDER_EXIT:-1}" -eq 0

  release-summary:
    name: Release candidate CI summary
    if: always() && inputs.candidate_ref != ''
    needs:
      - python-quality
      - secrets
      - rust-quality
      - rust-dependencies
      - msrv
      - python-tests
      - crash-harness
      - wheel-smoke
      - multiprocess-benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ inputs.expected_sha }}
      - name: Record complete CI status
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        shell: bash
        run: |
          if jq -e 'all(.[]; .result == "success")' <<<"$NEEDS_JSON" >/dev/null; then
            status=passed
          else
            status=failed
          fi
          python -m release_gate.cli summary-report \
            --name complete-ci \
            --status "$status" \
            --candidate-sha "$RELEASE_CANDIDATE_SHA" \
            --candidate-ref "$RELEASE_CANDIDATE_REF" \
            --version "$RELEASE_CANDIDATE_VERSION" \
            --output ci-summary.json
          test "$status" = passed
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-summary
          path: ci-summary.json
          if-no-files-found: error
          retention-days: 30
