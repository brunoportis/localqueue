name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python lint and types
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install Python quality tools
        run: |
          python -m pip install --upgrade \
            "pydantic>=2,<3" \
            "ruff>=0.15,<1" \
            "pyrefly>=1.1,<2"

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run Pyrefly
        env:
          PYTHONPATH: python
        run: pyrefly check --progress-bar no

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The CLI result is the quality gate. Keep SARIF uploads opt-in so
          # a transient Actions artifact quota cannot hide scan results.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_COMMENTS: "false"

  rust-quality:
    name: Rust format and Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  rust-dependencies:
    name: Rust dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check

  msrv:
    name: Rust MSRV 1.83
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install Rust 1.83
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # master
        with:
          toolchain: '1.83'

      - name: Check with MSRV
        run: cargo check --locked

  python-tests:
    name: Python tests (${{ matrix.os }}, Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.10'
          - os: ubuntu-latest
            python: '3.14'
          - os: macos-15
            python: '3.14'
          - os: windows-latest
            python: '3.14'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Cache Cargo dependencies and build outputs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py${{ matrix.python }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-py${{ matrix.python }}-
            ${{ runner.os }}-cargo-

      - name: Build extension in a virtual environment
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          python -m pip install --upgrade \
            "maturin>=1.14,<2" \
            "hypothesis>=6,<7" \
            "pytest>=8,<10" \
            "pytest-cov>=7,<8" \
            "pydantic>=2,<3"
          maturin develop --locked

      - name: Run tests
        if: matrix.os != 'ubuntu-latest' || matrix.python != '3.14'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pytest -ra

      - name: Run tests with branch coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.14'
        shell: bash
        run: |
          source .venv/bin/activate
          pytest -ra \
            --cov=localqueue \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Validate canonical benchmark smoke profile
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.14'
        shell: bash
        run: |
          source .venv/bin/activate
          python -m localqueue.benchmark --profile smoke --output "$RUNNER_TEMP/benchmark-smoke.json"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.14'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  crash-harness:
    name: Deterministic crash harness (Linux)
    needs: [rust-quality, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Install test build tooling
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade \
            "maturin>=1.14,<2" \
            "pytest>=8,<10" \
            "pydantic>=2,<3"

      - name: Build extension with explicit test-only feature
        run: |
          source .venv/bin/activate
          maturin develop --locked --features __crash_test

      - name: Run deterministic crash and control scenarios
        run: |
          source .venv/bin/activate
          pytest -ra tests/test_crash_recovery.py tests/test_backup.py

  wheel-smoke:
    name: Build and smoke-test wheel
    needs: [python-quality, secrets, rust-quality, rust-dependencies, python-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install maturin
        run: python -m pip install --upgrade "maturin>=1.14,<2"

      - name: Build wheel
        run: maturin build --release --locked -i python

      - name: Install wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall target/wheels/*.whl
          python -m pip install --upgrade "pydantic>=2,<3"

      - name: Verify normal wheel has no crash hooks
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/tests/test_wheel_isolation.py"

      - name: Import package outside the checkout
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import importlib.metadata
          import tempfile
          import localqueue

          from localqueue import SimpleQueue
          from localqueue import localqueue as native

          assert "site-packages" in localqueue.__file__
          assert "site-packages" in native.__file__
          assert native.__version__ == importlib.metadata.version("localqueue")

          with tempfile.TemporaryDirectory() as path:
              queue = SimpleQueue(path)
              queue.put({"source": "wheel-smoke"})
              job = queue.get(block=False)
              assert job.data == {"source": "wheel-smoke"}
              queue.ack(job)
              assert queue.stats()["acked"] == 1
              queue.close()
          PY

      - name: Run canonical benchmark from installed wheel
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python -m localqueue.benchmark \
            --profile smoke \
            --durability normal \
            --output "$RUNNER_TEMP/benchmark-wheel-smoke.json"
          python - <<'PY'
          import importlib.metadata
          import json
          import os
          import localqueue
          from localqueue import localqueue as native

          report = json.load(open("benchmark-wheel-smoke.json", encoding="utf-8"))
          assert report["schema_version"] == 1
          assert report["profile"]["profile_schema_version"] == 1
          assert report["run"]["status"] == "passed"
          assert len(report["scenarios"]) == 7
          assert all(item["status"] == "passed" for item in report["scenarios"])
          assert all(item["correctness"]["integrity"] for item in report["scenarios"])
          assert report["subject"]["package_native_versions_consistent"] is True
          assert report["subject"]["rust_extension_version"] == importlib.metadata.version("localqueue")
          assert "site-packages" in localqueue.__file__
          assert "site-packages" in native.__file__
          assert os.environ["GITHUB_WORKSPACE"] not in localqueue.__file__
          assert os.environ["GITHUB_WORKSPACE"] not in native.__file__
          PY
