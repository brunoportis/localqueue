name: Wheels

on:
  workflow_dispatch:
    inputs:
      candidate_run_id:
        description: Successful Release candidate evidence workflow run ID
        required: true
        type: string
      candidate_sha:
        description: Exact approved candidate SHA
        required: true
        type: string
      candidate_version:
        description: Exact approved candidate version
        required: true
        type: string
      candidate_ref:
        description: Immutable release-candidate/* branch
        required: true
        type: string
      public_claim:
        description: Exact maintainer-selected claim from the versioned policy
        required: true
        type: string
      private_vulnerability_reporting_confirmed:
        description: Human confirmation when the evidence token could not read this setting
        required: true
        type: boolean
      confirmation:
        description: Must be exactly 'publish v1.2.0'
        required: true
        type: string

permissions:
  contents: read
  actions: read
  issues: read

concurrency:
  group: promote-v1.2.0
  cancel-in-progress: false

env:
  CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
  CANDIDATE_SHA: ${{ inputs.candidate_sha }}
  CANDIDATE_VERSION: ${{ inputs.candidate_version }}
  CANDIDATE_REF: ${{ inputs.candidate_ref }}
  PUBLIC_CLAIM: ${{ inputs.public_claim }}
  PRIVATE_REPORTING_CONFIRMED: ${{ inputs.private_vulnerability_reporting_confirmed }}
  PROMOTION_CONFIRMATION: ${{ inputs.confirmation }}

jobs:
  validate-candidate:
    name: Validate approved evidence without publication credentials
    runs-on: ubuntu-latest
    outputs:
      parent_sha: ${{ steps.identity.outputs.parent_sha }}
      pypi_state: ${{ steps.external.outputs.pypi_state }}
      release_state: ${{ steps.external.outputs.release_state }}
    steps:
      - name: Check out trusted gate tooling from main
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python for evidence artifact validation
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Bootstrap packaging for evidence artifact validation
        run: python -m pip install --upgrade "packaging>=24,<26"

      - name: Validate explicit human inputs
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/wheels.yml@refs/heads/main"
          test "$CANDIDATE_VERSION" = "1.2.0"
          test "$CANDIDATE_REF" = "release-candidate/v1.2.0"
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CANDIDATE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          test "$PROMOTION_CONFIRMATION" = "publish v1.2.0"

      - name: Confirm evidence workflow identity and successful conclusion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view "$CANDIDATE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --json workflowName,headSha,status,conclusion,url,event,headBranch,databaseId \
            > evidence-run.json
          python -m release_gate.cli validate-run \
            --run evidence-run.json \
            --candidate-sha "$CANDIDATE_SHA" \
            --workflow "Release candidate evidence"
          test "$(jq -r .event evidence-run.json)" = workflow_dispatch
          test "$(jq -r .headBranch evidence-run.json)" = "$CANDIDATE_REF"

      - name: Download the approved evidence bundle only
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: release-evidence-v${{ inputs.candidate_version }}
          path: candidate-bundle
          run-id: ${{ inputs.candidate_run_id }}
          github-token: ${{ github.token }}

      - name: Validate manifest, reports, hashes and source identity
        run: |
          python -m release_gate.cli validate-manifest \
            --manifest candidate-bundle/evidence-manifest.json \
            --bundle candidate-bundle \
            --candidate-sha "$CANDIDATE_SHA" \
            --candidate-ref "$CANDIDATE_REF" \
            --version "$CANDIDATE_VERSION"

      - name: Confirm candidate is exactly one commit above current main
        id: identity
        shell: bash
        run: |
          git fetch origin main \
            "+refs/heads/$CANDIDATE_REF:refs/remotes/origin/$CANDIDATE_REF" \
            --tags
          test "$(git rev-parse "origin/$CANDIDATE_REF")" = "$CANDIDATE_SHA"
          parents=$(git rev-list --parents -n 1 "$CANDIDATE_SHA")
          test "$(wc -w <<<"$parents")" -eq 2
          parent_sha=$(awk '{print $2}' <<<"$parents")
          current_main=$(git rev-parse origin/main)
          if [[ "$current_main" != "$parent_sha" && "$current_main" != "$CANDIDATE_SHA" ]]; then
            echo "main advanced beyond the candidate; prepare a new candidate" >&2
            exit 1
          fi
          git diff-tree --no-commit-id --name-only -r "$CANDIDATE_SHA" | sort > candidate-files.txt
          python -m release_gate.cli validate-candidate-files --files candidate-files.txt
          git checkout --detach "$CANDIDATE_SHA"
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          python -m release_gate.cli versions --expected "$CANDIDATE_VERSION"
          python scripts/check_release_version.py --tag "v$CANDIDATE_VERSION"
          python -m pip install --upgrade "uv==0.11.6"
          uv lock --check
          python -m release_gate.cli validate-sources \
            --manifest candidate-bundle/evidence-manifest.json
          echo "parent_sha=$parent_sha" >> "$GITHUB_OUTPUT"

      - name: Repeat open-issue and security audits immediately before approval
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 1000 \
            --json number,title,body,labels,url > current-open-issues.json
          owner=${GITHUB_REPOSITORY%/*}
          repository=${GITHUB_REPOSITORY#*/}
          gh api graphql -F owner="$owner" -F repository="$repository" -f query='
            query($owner: String!, $repository: String!) {
              repository(owner: $owner, name: $repository) {
                issues(first: 100, states: [OPEN, CLOSED]) {
                  nodes { number state title closedByPullRequestsReferences(first: 10) {
                    nodes { number merged mergeCommit { oid } }
                  } }
                }
              }
            }' --jq '.data.repository.issues.nodes' > dependency-issues.json
          python -m release_gate.cli issue-audit \
            --issues current-open-issues.json \
            --dependency-issues dependency-issues.json \
            --candidate-sha "$CANDIDATE_SHA" \
            --candidate-ref "$CANDIDATE_REF" \
            --version "$CANDIDATE_VERSION" \
            --output current-open-issue-audit.json

          private_status=unknown
          if response=$(gh api "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" 2>/dev/null); then
            [[ "$(jq -r .enabled <<<"$response")" == true ]] && private_status=enabled || private_status=disabled
          fi
          test "$private_status" != disabled
          if [[ "$private_status" == unknown ]]; then
            test "$PRIVATE_REPORTING_CONFIRMED" = true
          fi

      - name: Validate human claim against approved evidence
        shell: bash
        run: |
          confirmation_flag=()
          if [[ "$PRIVATE_REPORTING_CONFIRMED" == true ]]; then
            confirmation_flag+=(--private-vulnerability-reporting-confirmed)
          fi
          python -m release_gate.cli validate-claim \
            --manifest candidate-bundle/evidence-manifest.json \
            --claim "$PUBLIC_CLAIM" \
            --confirmation "$PROMOTION_CONFIRMATION" \
            --version "$CANDIDATE_VERSION" \
            "${confirmation_flag[@]}"
          notes=release-notes/v1.2.0.md
          for phrase in "NFS" "SMB" "multi-host" "exactly-once" "physical ARM64" "physical power-loss"; do
            grep -Fqi "$phrase" "$notes"
          done

      - name: Check PyPI, tag and GitHub Release state
        id: external
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pypi_state=publish
          if curl --fail --silent --show-error \
            "https://pypi.org/pypi/localqueue/$CANDIDATE_VERSION/json" \
            --output pypi-metadata.json; then
            pypi_state=$(python -m release_gate.cli pypi-state \
              --inventory candidate-bundle/wheel-inventory.json \
              --metadata pypi-metadata.json)
          fi

          remote_tag=$(git ls-remote --tags origin "refs/tags/v$CANDIDATE_VERSION" | awk '{print $1}')
          if [[ -n "$remote_tag" && "$remote_tag" != "$CANDIDATE_SHA" ]]; then
            echo "existing final tag points to a different SHA" >&2
            exit 1
          fi

          release_state=absent
          if gh release view "v$CANDIDATE_VERSION" --repo "$GITHUB_REPOSITORY" \
            --json isDraft,tagName,body > release.json 2>/dev/null; then
            test "$(jq -r .tagName release.json)" = "v$CANDIDATE_VERSION"
            if [[ "$(jq -r .isDraft release.json)" == true ]]; then
              release_state=draft
            else
              release_state=published
              test "$pypi_state" = already-published
            fi
          fi
          echo "pypi_state=$pypi_state" >> "$GITHUB_OUTPUT"
          echo "release_state=$release_state" >> "$GITHUB_OUTPUT"

      - name: Reject divergent existing release assets
        if: steps.external.outputs.release_state != 'absent'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p existing-assets
          gh release download "v$CANDIDATE_VERSION" \
            --repo "$GITHUB_REPOSITORY" --dir existing-assets || true
          for asset in existing-assets/*; do
            [[ -e "$asset" ]] || continue
            expected="candidate-bundle/$(basename "$asset")"
            test -f "$expected"
            test "$(sha256sum "$asset" | awk '{print $1}')" = "$(sha256sum "$expected" | awk '{print $1}')"
          done
          if [[ "${{ steps.external.outputs.release_state }}" == published ]]; then
            test "$(find existing-assets -type f | wc -l)" -eq "$(find candidate-bundle -maxdepth 1 -type f | wc -l)"
          fi

      - name: Preserve the validated bytes for the environment-gated job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validated-promotion-bundle
          path: candidate-bundle/
          if-no-files-found: error
          retention-days: 3

  promote-and-publish:
    name: Human-approved promotion and trusted publication
    needs: validate-candidate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      actions: read
      issues: read
      id-token: write
    steps:
      - name: Check out trusted gate tooling from main
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python for promotion artifact validation
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Bootstrap packaging for promotion artifact validation
        run: python -m pip install --upgrade "packaging>=24,<26"

      - name: Download only the previously validated bytes
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: validated-promotion-bundle
          path: candidate-bundle

      - name: Repeat critical manifest, SHA, ref and version checks
        shell: bash
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_WORKFLOW_REF" = "$GITHUB_REPOSITORY/.github/workflows/wheels.yml@refs/heads/main"
          python -m release_gate.cli validate-manifest \
            --manifest candidate-bundle/evidence-manifest.json \
            --bundle candidate-bundle \
            --candidate-sha "$CANDIDATE_SHA" \
            --candidate-ref "$CANDIDATE_REF" \
            --version "$CANDIDATE_VERSION"
          git fetch origin main \
            "+refs/heads/$CANDIDATE_REF:refs/remotes/origin/$CANDIDATE_REF" \
            --tags
          test "$(git rev-parse "origin/$CANDIDATE_REF")" = "$CANDIDATE_SHA"
          test "$(git rev-parse "$CANDIDATE_SHA^")" = "${{ needs.validate-candidate.outputs.parent_sha }}"

      - name: Repeat mutable issue and security checks after environment approval
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 1000 \
            --json number,title,body,labels,url > current-open-issues.json
          owner=${GITHUB_REPOSITORY%/*}
          repository=${GITHUB_REPOSITORY#*/}
          gh api graphql -F owner="$owner" -F repository="$repository" -f query='
            query($owner: String!, $repository: String!) {
              repository(owner: $owner, name: $repository) {
                issues(first: 100, states: [OPEN, CLOSED]) {
                  nodes { number state title closedByPullRequestsReferences(first: 10) {
                    nodes { number merged mergeCommit { oid } }
                  } }
                }
              }
            }' --jq '.data.repository.issues.nodes' > dependency-issues.json
          git show "$CANDIDATE_SHA:CHANGELOG.md" > candidate-CHANGELOG.md
          python -m release_gate.cli issue-audit \
            --issues current-open-issues.json \
            --dependency-issues dependency-issues.json \
            --changelog candidate-CHANGELOG.md \
            --candidate-sha "$CANDIDATE_SHA" \
            --candidate-ref "$CANDIDATE_REF" \
            --version "$CANDIDATE_VERSION" \
            --output current-open-issue-audit.json
          if response=$(gh api "repos/$GITHUB_REPOSITORY/private-vulnerability-reporting" 2>/dev/null); then
            test "$(jq -r .enabled <<<"$response)" = true
          else
            test "$PRIVATE_REPORTING_CONFIRMED" = true
          fi

      - name: Promote candidate SHA to main and final tag without force
        shell: bash
        run: |
          main_sha=$(git rev-parse origin/main)
          tag_sha=$(git ls-remote --tags origin "refs/tags/v$CANDIDATE_VERSION" | awk '{print $1}')
          parent_sha="${{ needs.validate-candidate.outputs.parent_sha }}"
          candidate_sha="$CANDIDATE_SHA"
          if [[ "$main_sha" == "$parent_sha" && -z "$tag_sha" ]]; then
            git push --atomic origin \
              "$candidate_sha:refs/heads/main" \
              "$candidate_sha:refs/tags/v$CANDIDATE_VERSION"
          elif [[ "$main_sha" == "$parent_sha" && "$tag_sha" == "$candidate_sha" ]]; then
            git push origin "$candidate_sha:refs/heads/main"
          elif [[ "$main_sha" == "$candidate_sha" && -z "$tag_sha" ]]; then
            git push origin "$candidate_sha:refs/tags/v$CANDIDATE_VERSION"
          elif [[ "$main_sha" == "$candidate_sha" && "$tag_sha" == "$candidate_sha" ]]; then
            echo "main and tag already point to the approved candidate"
          else
            echo "main or tag diverged; refusing promotion" >&2
            exit 1
          fi
          git fetch origin main --tags
          test "$(git rev-parse origin/main)" = "$candidate_sha"
          test "$(git rev-parse "v$CANDIDATE_VERSION^{commit}")" = "$candidate_sha"

      - name: Create or validate the draft GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git show "$CANDIDATE_SHA:release-notes/v$CANDIDATE_VERSION.md" > release-notes.md
          python -m release_gate.cli render-release-body \
            --notes release-notes.md \
            --claim "$PUBLIC_CLAIM" \
            --version "$CANDIDATE_VERSION" \
            --output release-body.md
          if gh release view "v$CANDIDATE_VERSION" --repo "$GITHUB_REPOSITORY" \
            --json isDraft,body > existing-release.json 2>/dev/null; then
            if [[ "$(jq -r .isDraft existing-release.json)" == false ]]; then
              python -m release_gate.cli validate-release-body \
                --release existing-release.json --expected release-body.md
              echo "state=published" >> "$GITHUB_OUTPUT"
            else
              python -m release_gate.cli validate-release-body \
                --release existing-release.json --expected release-body.md
              echo "state=draft" >> "$GITHUB_OUTPUT"
            fi
          else
            gh release create "v$CANDIDATE_VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --draft \
              --title "v$CANDIDATE_VERSION" \
              --notes-file release-body.md
            echo "state=draft" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload only absent assets after hash-checking existing assets
        if: steps.release.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p existing-assets
          gh release download "v$CANDIDATE_VERSION" \
            --repo "$GITHUB_REPOSITORY" --dir existing-assets || true
          for asset in candidate-bundle/*; do
            name=$(basename "$asset")
            if [[ -f "existing-assets/$name" ]]; then
              test "$(sha256sum "$asset" | awk '{print $1}')" = "$(sha256sum "existing-assets/$name" | awk '{print $1}')"
            else
              gh release upload "v$CANDIDATE_VERSION" "$asset" \
                --repo "$GITHUB_REPOSITORY"
            fi
          done

      - name: Download and revalidate every release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p verified-release-assets
          gh release download "v$CANDIDATE_VERSION" \
            --repo "$GITHUB_REPOSITORY" --dir verified-release-assets
          test "$(find verified-release-assets -type f | wc -l)" -eq "$(find candidate-bundle -maxdepth 1 -type f | wc -l)"
          for expected in candidate-bundle/*; do
            actual="verified-release-assets/$(basename "$expected")"
            test -f "$actual"
            test "$(sha256sum "$expected" | awk '{print $1}')" = "$(sha256sum "$actual" | awk '{print $1}')"
          done

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.6'

      - name: Recheck PyPI and publish approved bytes through Trusted Publisher
        id: pypi
        shell: bash
        run: |
          pypi_state=publish
          if curl --fail --silent --show-error \
            "https://pypi.org/pypi/localqueue/$CANDIDATE_VERSION/json" \
            --output pypi-before.json; then
            pypi_state=$(python -m release_gate.cli pypi-state \
              --inventory candidate-bundle/wheel-inventory.json \
              --metadata pypi-before.json)
          fi
          if [[ "$pypi_state" == publish ]]; then
            uv publish \
              --trusted-publishing always \
              --check-url https://pypi.org/simple/ \
              candidate-bundle/*.whl \
              candidate-bundle/*.tar.gz
          fi
          echo "state=$pypi_state" >> "$GITHUB_OUTPUT"

      - name: Verify exact filenames and hashes on PyPI
        shell: bash
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              "https://pypi.org/pypi/localqueue/$CANDIDATE_VERSION/json" \
              --output pypi-after.json && \
              [[ "$(python -m release_gate.cli pypi-state \
                --inventory candidate-bundle/wheel-inventory.json \
                --metadata pypi-after.json)" == already-published ]]; then
              exit 0
            fi
            sleep 3
          done
          echo "PyPI did not expose the exact approved files and hashes" >&2
          exit 1

      - name: Publish GitHub Release only after PyPI verification
        if: steps.release.outputs.state == 'draft'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "v$CANDIDATE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --latest

      - name: Verify completed public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh release view "v$CANDIDATE_VERSION" \
            --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = false
