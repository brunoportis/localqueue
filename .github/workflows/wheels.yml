name: Wheels

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Existing v* tag to publish; leave empty for a build-only run
        required: false
        type: string
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_mode: ${{ steps.release.outputs.release_mode }}
      release_ref: ${{ steps.release.outputs.release_ref }}
    steps:
      - name: Resolve release mode
        id: release
        env:
          INPUT_RELEASE_REF: ${{ inputs.release_ref }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        shell: bash
        run: |
          if [[ -n "$INPUT_RELEASE_REF" ]]; then
            release_ref="$INPUT_RELEASE_REF"
            release_mode=true
          elif [[ "$REF_TYPE" == "tag" && "$REF_NAME" == v* ]]; then
            release_ref="$REF_NAME"
            release_mode=true
          else
            release_ref="$REF_NAME"
            release_mode=false
          fi

          if [[ "$release_mode" == true && "$release_ref" != v* ]]; then
            echo "release_ref must start with v" >&2
            exit 1
          fi

          echo "release_mode=$release_mode" >> "$GITHUB_OUTPUT"
          echo "release_ref=$release_ref" >> "$GITHUB_OUTPUT"

      - name: Create draft GitHub release
        if: steps.release.outputs.release_mode == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ steps.release.outputs.release_ref }}
        run: |
          gh release view "$RELEASE_REF" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
          gh release create "$RELEASE_REF" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "$RELEASE_REF"

      - name: Refuse to rebuild an already published release
        if: steps.release.outputs.release_mode == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ steps.release.outputs.release_ref }}
        run: |
          if gh release view "$RELEASE_REF" --repo "$GITHUB_REPOSITORY" \
            --json isDraft --jq '.isDraft == false' | grep -qx true; then
            echo "release $RELEASE_REF is already published" >&2
            exit 1
          fi

  validate-release:
    name: Validate release version
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Validate tag and package metadata
        if: needs.prepare-release.outputs.release_mode == 'true'
        run: python scripts/check_release_version.py --tag "${{ needs.prepare-release.outputs.release_ref }}"

  build:
    name: ${{ matrix.name }}
    needs: [prepare-release, validate-release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_17'
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: '2_17'
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: off
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            manylinux: off
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: off
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Set up QEMU for Linux ARM64
        if: matrix.name == 'linux-aarch64'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Python interpreters
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --find-interpreter --compatibility pypi
          maturin-version: v1.14.1

      - name: Set up smoke-test Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install one wheel for smoke testing
        if: matrix.name != 'linux-aarch64'
        shell: bash
        run: |
          python -m pip install --upgrade "pydantic>=2,<3"
          python -m pip install --force-reinstall --no-index target/wheels/*cp313*.whl

      - name: Smoke-test installed wheel outside the checkout
        if: matrix.name != 'linux-aarch64'
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import tempfile

          from localqueue import EnqueueItem, SimpleQueue
          from localqueue.bus import BaseEvent, BusTopology, EventBus

          class WheelEvent(BaseEvent):
              value: int

          with tempfile.TemporaryDirectory() as path:
              queue = SimpleQueue(path)
              queue.put_many([
                  {"platform": "wheel"},
                  EnqueueItem({"platform": "batch"}, job_id="batch-1"),
              ])
              job = queue.get(block=False)
              queue.ack(job)
              job = queue.get(block=False)
              queue.ack(job)
              assert queue.stats()["acked"] == 2
              queue.close()

              topology = BusTopology({"smoke": [WheelEvent]})
              bus = EventBus(path, topology=topology)
              smoke = bus.subscription("smoke")

              @smoke.handler(WheelEvent)
              def handle(event: WheelEvent) -> None:
                  assert event.value == 1

              receipt = bus.dispatch(WheelEvent(value=1))
              assert receipt.subscriptions == ("smoke",)
              bus.close()
          PY

      - name: Validate Linux ARM64 wheel artifact
        if: matrix.name == 'linux-aarch64'
        shell: bash
        run: test -n "$(find target/wheels -name '*cp313*.whl' -print -quit)"

      - name: Build source distribution
        if: matrix.name == 'linux-x86_64'
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out target/dist
          maturin-version: v1.14.1

      - name: Upload wheels
        if: needs.prepare-release.outputs.release_mode != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.name }}
          path: target/wheels/*.whl
          if-no-files-found: error

      - name: Upload source distribution
        if: matrix.name == 'linux-x86_64' && needs.prepare-release.outputs.release_mode != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: source-distribution
          path: target/dist/*.tar.gz
          if-no-files-found: error

      - name: Upload distributions to draft GitHub release
        if: needs.prepare-release.outputs.release_mode == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
        run: |
          gh release upload "$RELEASE_REF" target/wheels/*.whl \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

          if [[ "${{ matrix.name }}" == "linux-x86_64" ]]; then
            gh release upload "$RELEASE_REF" target/dist/*.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

  benchmark-release:
    name: Canonical multiprocess release benchmark
    if: needs.prepare-release.outputs.release_mode == 'true'
    needs: [prepare-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Check out release source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Download the release-candidate Linux x86_64 wheel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
        run: |
          python scripts/check_release_version.py --tag "$RELEASE_REF"
          mkdir -p "$RUNNER_TEMP/wheels"
          gh release download "$RELEASE_REF" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$RUNNER_TEMP/wheels" \
            --pattern '*cp313*manylinux*x86_64.whl'
          test "$(find "$RUNNER_TEMP/wheels" -name '*.whl' | wc -l)" -eq 1

      - name: Install and prove release wheel isolation
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/benchmark-venv"
          source "$RUNNER_TEMP/benchmark-venv/bin/activate"
          python -m pip install --force-reinstall --no-index "$RUNNER_TEMP"/wheels/*.whl
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import importlib.metadata
          import os
          import localqueue
          from localqueue import localqueue as native

          assert "site-packages" in localqueue.__file__
          assert "site-packages" in native.__file__
          assert os.environ["GITHUB_WORKSPACE"] not in localqueue.__file__
          assert native.__version__ == importlib.metadata.version("localqueue")
          assert not any(name.startswith("_test_") for name in dir(native.NativeQueue))
          PY

      - name: Run canonical release profile and render partial report
        id: benchmark
        shell: bash
        env:
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
        run: |
          source "$RUNNER_TEMP/benchmark-venv/bin/activate"
          commit_sha=$(git rev-list -n 1 "$RELEASE_REF")
          asset_base="localqueue-${RELEASE_REF}-benchmark"
          set +e
          cd "$RUNNER_TEMP"
          LOCALQUEUE_COMMIT_SHA="$commit_sha" python -m localqueue.benchmark \
            --profile multiprocess-release \
            --output "${asset_base}.json"
          benchmark_exit=$?
          if [[ -f "${asset_base}.json" ]]; then
            python -m localqueue.benchmark render \
              "${asset_base}.json" \
              --output "${asset_base}.md"
            render_exit=$?
          else
            render_exit=0
          fi
          echo "asset_base=$asset_base" >> "$GITHUB_OUTPUT"
          echo "benchmark_exit=$benchmark_exit" >> "$GITHUB_OUTPUT"
          echo "render_exit=$render_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload reports to Actions
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-benchmark-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/localqueue-*-benchmark.json
            ${{ runner.temp }}/localqueue-*-benchmark.md
          if-no-files-found: warn

      - name: Attach reports to draft GitHub release
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
          ASSET_BASE: ${{ steps.benchmark.outputs.asset_base }}
        run: |
          if [[ -n "$ASSET_BASE" && -f "$RUNNER_TEMP/${ASSET_BASE}.json" ]]; then
            gh release upload "$RELEASE_REF" "$RUNNER_TEMP/${ASSET_BASE}.json" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
          if [[ -n "$ASSET_BASE" && -f "$RUNNER_TEMP/${ASSET_BASE}.md" ]]; then
            gh release upload "$RELEASE_REF" "$RUNNER_TEMP/${ASSET_BASE}.md" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

      - name: Enforce benchmark correctness result
        if: always()
        shell: bash
        env:
          BENCHMARK_EXIT: ${{ steps.benchmark.outputs.benchmark_exit }}
          RENDER_EXIT: ${{ steps.benchmark.outputs.render_exit }}
        run: |
          test "${BENCHMARK_EXIT:-1}" -eq 0
          test "${RENDER_EXIT:-1}" -eq 0

  publish:
    name: Publish complete release to PyPI
    if: needs.prepare-release.outputs.release_mode == 'true'
    needs: [prepare-release, build, benchmark-release]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download distributions from draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
        run: |
          mkdir -p target/dist
          gh release download "$RELEASE_REF" \
            --repo "$GITHUB_REPOSITORY" \
            --dir target/dist

          for python_tag in cp310 cp311 cp312 cp313 cp314; do
            wheel_count=$(find target/dist -name "*-${python_tag}-${python_tag}-*.whl" | wc -l)
            if [[ "$wheel_count" -ne 5 ]]; then
              echo "expected 5 wheels for $python_tag, found $wheel_count" >&2
              exit 1
            fi
          done

          test "$(find target/dist -name '*.tar.gz' | wc -l)" -eq 1

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Publish distributions only
        run: |
          uv publish \
            --trusted-publishing always \
            --check-url https://pypi.org/simple/ \
            target/dist/*.whl \
            target/dist/*.tar.gz

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REF: ${{ needs.prepare-release.outputs.release_ref }}
        run: |
          gh release edit "$RELEASE_REF" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --latest
