name: Wheels

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_17'
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: '2_17'
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: off
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            manylinux: off
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: off
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU for Linux ARM64
        if: matrix.name == 'linux-aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Python interpreters
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --find-interpreter --compatibility pypi
          maturin-version: v1.14.1

      - name: Set up smoke-test Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install one wheel for smoke testing
        if: matrix.name != 'linux-aarch64'
        shell: bash
        run: |
          python -m pip install --upgrade "pydantic>=2,<3"
          python -m pip install --force-reinstall --no-index target/wheels/*cp313*.whl

      - name: Smoke-test installed wheel outside the checkout
        if: matrix.name != 'linux-aarch64'
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import tempfile

          from localqueue import EnqueueItem, SimpleQueue
          from localqueue.bus import BaseEvent, EventBus

          class WheelEvent(BaseEvent):
              value: int

          with tempfile.TemporaryDirectory() as path:
              queue = SimpleQueue(path)
              queue.put_many([
                  {"platform": "wheel"},
                  EnqueueItem({"platform": "batch"}, job_id="batch-1"),
              ])
              job = queue.get(block=False)
              queue.ack(job)
              job = queue.get(block=False)
              queue.ack(job)
              assert queue.stats()["acked"] == 2
              queue.close()

              bus = EventBus(path)

              @bus.on(WheelEvent, subscription="smoke")
              def handle(event: WheelEvent) -> None:
                  assert event.value == 1

              receipt = bus.dispatch(WheelEvent(value=1))
              assert receipt.subscriptions == ("smoke",)
              bus.close()
          PY

      - name: Validate Linux ARM64 wheel artifact
        if: matrix.name == 'linux-aarch64'
        shell: bash
        run: test -n "$(find target/wheels -name '*cp313*.whl' -print -quit)"

      - name: Build source distribution
        if: matrix.name == 'linux-x86_64'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out target/dist
          maturin-version: v1.14.1

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: target/wheels/*.whl
          if-no-files-found: error

      - name: Upload source distribution
        if: matrix.name == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: source-distribution
          path: target/dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish complete release to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: target/dist
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: source-distribution
          path: target/dist

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Publish all artifacts
        run: uv publish --trusted-publishing always target/dist/*
