name: Wheels

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_17'
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            manylinux: off
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            manylinux: off
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: off
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python interpreters
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --find-interpreter --compatibility pypi
          maturin-version: v1.14.1

      - name: Set up smoke-test Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install one wheel for smoke testing
        shell: bash
        run: python -m pip install --force-reinstall --no-index target/wheels/*cp313*.whl

      - name: Smoke-test installed wheel outside the checkout
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import tempfile

          from simpleq import SimpleQueue

          with tempfile.TemporaryDirectory() as path:
              queue = SimpleQueue(path)
              queue.put({"platform": "wheel"})
              job = queue.get(block=False)
              queue.ack(job)
              assert queue.stats()["acked"] == 1
              queue.close()
          PY

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: target/wheels/*.whl
          if-no-files-found: error
