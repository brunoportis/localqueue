name: Python quality contracts

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-contracts:
    name: Lint, typing, and complexity contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install quality tools
        run: |
          python -m pip install --upgrade \
            "pydantic>=2,<3" \
            "ruff>=0.15,<1" \
            "radon>=6,<7" \
            "pyrefly>=1.1,<2"

      - name: Enforce repository lint and formatting
        run: |
          ruff check .
          ruff format --check .

      - name: Enforce runtime complexity contracts
        run: ruff check python/localqueue --config ruff-runtime.toml

      - name: Surface explicit Any diagnostics
        env:
          PYTHONPATH: python
        run: pyrefly check --progress-bar no --min-severity warn

      - name: Enforce strict public type coverage
        env:
          PYTHONPATH: python
        run: >-
          pyrefly coverage check python/localqueue
          --strict
          --public-only
          --fail-under 89.83

      - name: Generate Radon reports
        shell: bash
        run: |
          mkdir -p artifacts
          radon cc python/localqueue -s -a > artifacts/radon-cc.txt
          radon mi python/localqueue -s > artifacts/radon-mi.txt
          radon raw python/localqueue -s > artifacts/radon-raw.txt

      - name: Upload Radon reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-quality-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30
