name: Quality baseline

on:
  pull_request:
  push:
    branches:
      - agent/issue-61-quality-baselines
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff-baseline:
    name: Measure Ruff complexity baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install Ruff
        run: python -m pip install --upgrade "ruff>=0.15,<1"

      - name: Report complexity findings
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          ruff check python/localqueue \
            --preview \
            --select C901,PLR0911,PLR0912,PLR0913,PLR0915,PLR1702 \
            2>&1 | tee artifacts/ruff-findings.txt
          ruff check python/localqueue \
            --preview \
            --select C901,PLR0911,PLR0912,PLR0913,PLR0915,PLR1702 \
            --statistics \
            2>&1 | tee artifacts/ruff-statistics.txt
          exit 0

      - name: Upload Ruff baseline
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-ruff-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

  pyrefly-baseline:
    name: Measure strict public typing baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install Pyrefly dependencies
        run: |
          python -m pip install --upgrade \
            "pydantic>=2,<3" \
            "pyrefly>=1.1,<2"

      - name: Report explicit Any findings
        continue-on-error: true
        shell: bash
        env:
          PYTHONPATH: python
        run: |
          mkdir -p artifacts
          set -o pipefail
          pyrefly check --progress-bar no --min-severity warn 2>&1 | tee artifacts/pyrefly-check.txt

      - name: Report strict public type coverage
        shell: bash
        env:
          PYTHONPATH: python
        run: |
          set -o pipefail
          pyrefly coverage check python/localqueue \
            --strict \
            --public-only \
            --fail-under 0 2>&1 | tee artifacts/pyrefly-coverage.txt

      - name: Upload Pyrefly baseline
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-pyrefly-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

  radon-baseline:
    name: Measure Radon baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install Radon
        run: python -m pip install --upgrade "radon>=6,<7"

      - name: Report metrics
        shell: bash
        run: |
          mkdir -p artifacts
          radon cc python/localqueue -s -a | tee artifacts/radon-cc.txt
          radon mi python/localqueue -s | tee artifacts/radon-mi.txt
          radon raw python/localqueue -s | tee artifacts/radon-raw.txt

      - name: Upload Radon baseline
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-radon-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7
